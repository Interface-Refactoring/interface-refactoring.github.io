link NInProduction to TwoInProduction--><path d="M476,63.63 C476,87.32 476,127.72 476,153.61 " fill="none" id="NInProduction-to-TwoInProduction" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="476,158.91,480,149.91,476,153.91,472,149.91,476,158.91" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218" x="477" y="124.9951">Reduce the number of versions</text><!--MD5=[e9f322c7535e3debec8ed758c736865e]
@startuml

skinparam defaultFontName sans-serif
skinparam ClassBackgroundColor White
hide empty members
hide circle
skinparam defaultFontSize 14
skinparam classfontstyle bold
skinparam shadowing false
skinparam backgroundColor #f3f6f6
hide empty description

state "Aggressive Obsolescence" as AggressiveObsolescence
state "Eternal Lifetime Guarantee " as EternalLifetimeGuarantee
state "Limited Lifetime Guarantee " as LimitedLifetimeGuarantee
state "Two in Production (N-1)" as TwoInProduction
state "N In Production" as NInProduction

EternalLifetimeGuarantee - -> LimitedLifetimeGuarantee : Limit the lifetime of the API

LimitedLifetimeGuarantee - -> AggressiveObsolescence : Offer even fewer guarantees to clients,\nAPI can be deprecated\nand then removed at any time

TwoInProduction - -> LimitedLifetimeGuarantee : Transition from multiple version support\nto one with\na clearly defined lifetime

TwoInProduction - -> AggressiveObsolescence : Transition from multiple version support\nto ad hoc deprecation\nand subsequent removal 

NInProduction - -> TwoInProduction : Reduce the number of versions

note "Two In Production and N In Production\ncan be combined with other\nlifetime guarantee patterns \nsuch as Limited Lifetime Guarantee" as N1
'N1 - - TwoInProduction
'N1 - - LimitedLifetimeGuarantee
@enduml

