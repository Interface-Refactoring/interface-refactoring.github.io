.3388,206.2633,113.8323,207.559,123.5901,208.895" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180" x="105" y="178.9951">Limit the lifetime of the API</text><path d="M205,249.0625 C205,264.8519 205,287.1792 205,302.962 " fill="none" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="205,302.962,209,293.962,205,297.962,201,293.962,205,302.962" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263" x="206" y="280.9951">Offer even fewer guarantees to clients</text><path d="M306.338,139.2752 C304.068,154.8788 298.6987,176.5621 286,191 C279.6696,198.1975 271.6544,204.0789 263.1418,208.8596 " fill="none" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="263.1418,208.8596,272.9477,207.9402,267.5014,206.4112,269.0304,200.9649,263.1418,208.8596" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="241" x="303" y="170.9951">Transition from multiple versions to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227" x="314" y="187.292">one with a clearly defined lifetime</text><path d="M308,45.0625 C308,60.8519 308,83.1792 308,98.962 " fill="none" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="308,98.962,312,89.962,308,93.962,304,89.962,308,98.962" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218" x="309" y="76.9951">Reduce the number of versions</text><!--MD5=[1c79c93b14d0c13390864cce6350e843]
@startuml

!pragma layout smetana

skinparam defaultFontName sans-serif
skinparam ClassBackgroundColor White
hide empty members
hide circle
skinparam defaultFontSize 14
skinparam lengthAdjust spacing
skinparam classfontstyle bold
skinparam shadowing false
skinparam backgroundColor #f3f6f6
hide empty description

state "Aggressive Obsolescence" as AggressiveObsolescence
state "Eternal Lifetime Guarantee" as EternalLifetimeGuarantee
state "Limited Lifetime Guarantee" as LimitedLifetimeGuarantee
state "Two In Production" as TwoInProduction
state "N In Production" as NInProduction

EternalLifetimeGuarantee - -> LimitedLifetimeGuarantee : Limit the lifetime of the API

LimitedLifetimeGuarantee - -> AggressiveObsolescence : Offer even fewer guarantees to clients

TwoInProduction - -> LimitedLifetimeGuarantee : Transition from multiple versions to \n one with a clearly defined lifetime

NInProduction - -> TwoInProduction : Reduce the number of versions

@enduml

