link TwoInProduction to NInProduction--><path d="M261.96,634.56 C261.96,656.49 261.96,692.55 261.96,716.54 " fill="none" id="TwoInProduction-to-NInProduction" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="261.96,721.76,265.96,712.76,261.96,716.76,257.96,712.76,261.96,721.76" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="194" x="262.96" y="687.9951">Offer three or more versions</text><!--MD5=[37ba12250fcdd040a817da607d4837fa]
@startuml

skinparam defaultFontName sans-serif
skinparam ClassBackgroundColor White
hide empty members
hide circle
skinparam defaultFontSize 14
skinparam classfontstyle bold
skinparam shadowing false
skinparam backgroundColor #f3f6f6
hide empty description

state "Lifecycle guarantee(s) not specified " as NoGuarantees
state "Experimental Preview " as ExperimentalPreview
state "Aggressive Obsolescence" as AggressiveObsolescence
state "Limited Lifetime Guarantee " as LimitedLifetimeGuarantee
state "Two in Production" as TwoInProduction
state "N In Production (N > 2) " as NInProduction

NoGuarantees - -> ExperimentalPreview : Introduce changes and gather \n feedback from clients, without \nlong term commitment

ExperimentalPreview - -> AggressiveObsolescence : Increase guarantees, but \n keep options to sunset \n as early as possible

AggressiveObsolescence - -> LimitedLifetimeGuarantee : Give a fixed time-frame \n during which the API \n will not be broken

ExperimentalPreview - -> LimitedLifetimeGuarantee : Give a fixed time-frame \n during which the API \n will not be broken

ExperimentalPreview - -> TwoInProduction : Ease migration for clients by\n providing more than one version 
AggressiveObsolescence - -> TwoInProduction : Provide stable\n and less stable version

LimitedLifetimeGuarantee - -> TwoInProduction : Guarantee overlapping life times  

TwoInProduction - -> NInProduction: Offer three or more versions

note right of TwoInProduction : Two In Production (and N In Production)\ncan be combined with other lifetime guarantee\npatterns such as Limited Lifetime Guarantee
@enduml

