.4904,250.4721,182.6391" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="37" x="412.5" y="233.5889">HTTP</text><path d="M429.6569,182.7673 C437.6324,193.4464 447.1035,206.8756 454.5,219.5938 C464.8865,237.4532 474.5902,258.9183 481.1332,274.3883 " fill="none" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="429.6569,182.7673,431.8374,192.3718,432.6488,186.7734,438.2472,187.5847,429.6569,182.7673" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="37" x="464.5" y="233.5889">HTTP</text><path d="M718.8132,182.612 C702.4919,198.3727 678.8298,220.2971 656.5,237.5938 C644.3183,247.0297 641.5315,250.2258 627.5,256.5938 C608.1344,265.3825 586.3111,272.5951 565.8319,278.3041 " fill="none" style="stroke:#A80036;stroke-width:1.0;"/><polygon fill="#A80036" points="718.8132,182.612,709.5605,185.9864,715.2165,186.0852,715.1176,191.7412,718.8132,182.612" style="stroke:#A80036;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="37" x="678.5" y="233.5889">HTTP</text><!--MD5=[df156b363347069fa69601627641c6aa]
@startuml

!pragma layout smetana

skinparam defaultFontName sans-serif
skinparam ClassBackgroundColor White
hide empty members
hide circle
skinparam defaultFontSize 14
skinparam lengthAdjust spacing
skinparam classfontstyle bold
skinparam shadowing false
skinparam backgroundColor #f3f6f6

class "Customer Core" as CC <<Spring Boot>>
class "Customer Management Backend" as CMB <<Spring Boot>>
class "Customer Management Frontend" as CMF <<React>>
class "Customer Self-Service Backend" as CCB <<Spring Boot>>
class "Customer Self-Service Frontend" as CCF <<React>>
class "Policy Management Backend" as PMB <<Spring Boot>>
class "Policy Management Frontend" as PMF <<Vue.js>>
class "Risk Management Server" as RMS <<Node.js>>
class "Risk Management Client" as RMC <<Node.js>>
class "Spring Boot Admin" as SBA <<Spring Boot>>

PMB -down- -> CC : HTTP
CCB -down- -> CC : HTTP
CMB -down- -> CC : HTTP
CMF -down- -> CMB : HTTP + WebSocket
CMF -[hidden]> CCF
CMB -[hidden]> CCB
CCF -down- -> CMB : HTTP + WebSocket
CCF -down- -> CCB : HTTP
CCF -down- -> PMB : HTTP
PMF -down- -> PMB : HTTP
RMC -down- -> RMS : gRPC  
PMB -right- -> RMS : ActiveMQ
CCB <- -right- -> PMB : ActiveMQ
SBA -up- -> CMB : HTTP
SBA -up- -> CCB : HTTP
SBA -up- -> PMB : HTTP

@enduml

